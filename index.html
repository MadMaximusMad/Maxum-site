<style>
  :root {
    --bg: #0054FA;
    --white: #fff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: Arial, sans-serif;
  }
  .intro {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--white);
    z-index: 9999;
    opacity: 1;
    visibility: visible;
  }
  .hidden { display: none; pointer-events: none; }
  .logo-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    width: min(100vw, 1440px);
    aspect-ratio: 1440 / 900;
    transform: translate(-50%, -50%) scale(calc(657 / 927));
    transform-origin: 50% 50%;
    backface-visibility: hidden;
    will-change: transform, opacity;
    opacity: 0;
  }
  .wordmark-box {
    position: absolute;
    left: 18.4%;
    top: 32.7%;
    width: 63.8%;
    height: 34.0%;
  }
  .wordmark-border {
    position: absolute;
    inset: 0;
    border: 4px solid #fff;
    opacity: 0;
  }
  .wordmark-slices {
    position: absolute;
    left: 9.55%;
    right: 9.55%;
    top: 19.2%;
    bottom: 19.2%;
    overflow: hidden;
  }
  .slice {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 12.5%;
    overflow: hidden;
    opacity: 0;
    transform: translateY(100%);
    will-change: transform, opacity;
  }
  .slice-inner {
    position: absolute;
    inset: 0;
    width: 800%;
    height: 100%;
    display: flex;
    align-items: center;
  }
  .slice svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .border-shrink-group {
    position: absolute;
    inset: 0;
    transform-origin: 50% 50%;
    will-change: transform, opacity;
  }
  .border-shrink {
    position: absolute;
    background: #fff;
    transform-origin: 50% 50%;
  }
  .border-shrink.top {
    left: 0;
    top: 0;
    width: 100%;
    height: 18.07%;
    transform-origin: 50% 0%;
    transform: scaleX(1) scaleY(0);
  }
  .border-shrink.left {
    left: 0;
    top: 0;
    width: 5.56%;
    height: 100%;
    transform-origin: 0% 50%;
    transform: scaleX(0) scaleY(1);
  }
  .border-shrink.right {
    right: 0;
    top: 0;
    width: 5.56%;
    height: 100%;
    transform-origin: 100% 50%;
    transform: scaleX(0) scaleY(1);
  }
  .border-shrink.bottom {
    left: 0;
    bottom: 0;
    width: 100%;
    height: 18.07%;
    transform-origin: 50% 100%;
    transform: scaleX(1) scaleY(0);
  }

    left: 50%;

    left: 50%;

    will-change: transform, opacity;

<script>
(() => {
  const intro = document.getElementById('intro');
  const logoWrap = document.getElementById('logoWrap');
  const border = document.getElementById('wordmarkBorder');
  const slices = Array.from(document.querySelectorAll('.slice'));
  const borderShrinkGroup = document.getElementById('borderShrinkGroup');
  const shrinkBars = {
    top: document.querySelector('.border-shrink.top'),
    left: document.querySelector('.border-shrink.left'),
    right: document.querySelector('.border-shrink.right'),
    bottom: document.querySelector('.border-shrink.bottom'),
  };
  const logoSymbol = document.getElementById('logoSymbol');
  const logoOutline = document.getElementById('logoOutline');
  const pattern = document.getElementById('pattern');

  const quintIn = t => t*t*t*t*t;
  const quintOut = t => 1 - Math.pow(1 - t, 5);
  const quintInOut = t => t < 0.5 ? 16 * t*t*t*t*t : 1 - Math.pow(-2*t + 2, 5) / 2;

  function animate(duration, update, ease = t => t) {
    return new Promise(resolve => {
      const start = performance.now();
      function frame(now) {
        const raw = Math.min((now - start) / (duration * 1000), 1);
        const eased = ease(raw);
        update(eased, raw);
        if (raw < 1) requestAnimationFrame(frame);
        else resolve();
      }
      requestAnimationFrame(frame);
    });
  }

  function delay(sec) {
    return new Promise(resolve => setTimeout(resolve, sec * 1000));
  }

  function setBorderVisible(v) {
    border.style.opacity = v ? '1' : '0';
  }

  function setStyles() {
    logoWrap.style.opacity = '1';
    slices.forEach(s => {
      s.style.opacity = '0';
      s.style.transform = 'translateY(100%) translateX(0)';
    });
    logoSymbol.style.opacity = '0';
    logoOutline.style.opacity = '0';
    pattern.style.opacity = '0';
  }

  async function introSequence() {
    setStyles();

    // start
    const logoScaleFrom = 657 / 927;
    animate(1.14, t => {
      const scale = logoScaleFrom + (1 - logoScaleFrom) * t;
      logoWrap.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }, quintOut);

    slices.forEach((slice, i) => {
      setTimeout(() => {
        animate(1.0, t => {
          slice.style.transform = `translateY(${(1 - t) * 100}%) translateX(0)`;
        }, quintInOut);
      }, i * 50);
    });

    setTimeout(() => {
      slices.forEach(slice => {
        animate(0.3, t => {
          slice.style.opacity = String(t);
        });
      });
    }, 300);

    animate(0.2, t => {
      border.style.opacity = String(t);
    });

    await delay(1.1);
    setBorderVisible(true);
    await delay(0.03);
    setBorderVisible(false);
    await delay(0.04);
    setBorderVisible(true);
    await delay(0.03);
    setBorderVisible(false);
    await delay(0.03);
    setBorderVisible(true);
    await delay(0.03);
    setBorderVisible(false);
    await delay(0.07);
    setBorderVisible(true);

    await delay(0.3);

    // shrink
    const vw = window.innerWidth;
    const offsets = [0.25*vw, 0.1875*vw, 0.125*vw, 0.0625*vw, -0.0625*vw, -0.125*vw, -0.1875*vw, -0.25*vw];

    const shrinkA = animate(0.4, t => {
      shrinkBars.top.style.transform = `scaleX(1) scaleY(${t})`;
      shrinkBars.left.style.transform = `scaleX(${t}) scaleY(1)`;
      shrinkBars.right.style.transform = `scaleX(${t}) scaleY(1)`;
      shrinkBars.bottom.style.transform = `scaleX(1) scaleY(${t})`;
    }, quintIn);

    const shrinkB = animate(0.4, t => {
      slices.forEach((slice, i) => {
        slice.style.transform = `translateY(0%) translateX(${offsets[i] * t}px)`;
      });
    }, quintIn);

    const shrinkC = animate(0.4, t => {
      const sx = 1 - 0.25 * t;
      border.style.transform = `scaleX(${sx}) scaleY(1)`;
      borderShrinkGroup.style.transform = `scaleX(${sx}) scaleY(1)`;
    }, quintIn);

    setTimeout(() => {
      animate(0.05, t => {
        logoWrap.style.opacity = String(1 - t);
      });
    }, 350);

    await Promise.all([shrinkA, shrinkB, shrinkC]);

    // logo phase
    const pulse = animate(0.8, t => {
      logoOutline.style.opacity = String(Math.max(0, 0.92 * (1 - t)));
      const s = 1 + 1.55 * t;
      logoOutline.style.transform = `translate(-50%, -50%) scale(${s})`;
    }, quintOut);

    const logoInScale = animate(0.5, t => {
      const s = 20 + (1 - 20) * t;
      logoSymbol.style.transform = `translate(-50%, -50%) scale(${s})`;
    }, quintOut);

    setTimeout(() => {
      animate(0.05, t => {
        logoSymbol.style.opacity = String(t);
        logoOutline.style.opacity = String(0.92 * (1 - t*0.18));
      });
    }, 100);

    await Promise.all([logoInScale, pulse]);

    // out
    const outSymbol = animate(1.0, t => {
      logoSymbol.style.opacity = String(1 - t);
    });

    const patternInOpacity = (async () => {
      await delay(0.0);
      animate(1.9, t => {
        pattern.style.opacity = String(t);
      });
    })();

    const patternInScale = (async () => {
      await delay(0.0);
      animate(1.9, t => {
        const start = 200 / 3374;
        const s = start + (1 - start) * t;
        pattern.style.transform = `translate(-50%, -50%) scale(${s})`;
      }, quintInOut);
    })();

    await delay(1.9);
    const patternOut = animate(1.0, t => {
      pattern.style.opacity = String(1 - t);
    });

    await Promise.all([outSymbol, patternInOpacity, patternInScale, patternOut]);

    animate(1.0, t => {
      intro.style.opacity = String(1 - t);
    });
    await delay(0.8);
    intro.style.visibility = 'hidden';
    intro.style.pointerEvents = 'none';
  }

  window.addEventListener('load', introSequence, { once: true });
})();
</script>
